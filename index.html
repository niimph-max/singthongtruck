  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fdiv><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:11px;\"><div style=\"width:26px;height:26px;border-radius:7px;background:#fef3eb;\"><\u002Fdiv><div style=\"flex:1;\"><div style=\"height:8px;width:52%;background:#d4dfec;border-radius:4px;margin-bottom:6px;\"><\u002Fdiv><div style=\"height:7px;width:30%;background:#e6edf5;border-radius:4px;\"><\u002Fdiv><\u002Fdiv><div style=\"height:18px;width:46px;border-radius:6px;background:#fdeee0;\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;\"><div style=\"width:26px;height:26px;border-radius:7px;background:#eef0f3;\"><\u002Fdiv><div style=\"flex:1;\"><div style=\"height:8px;width:46%;background:#d4dfec;border-radius:4px;margin-bottom:6px;\"><\u002Fdiv><div style=\"height:7px;width:34%;background:#e6edf5;border-radius:4px;\"><\u002Fdiv><\u002Fdiv><div style=\"height:18px;width:46px;border-radius:6px;background:#eef1f4;\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:-20px;left:-26px;background:#fff;border-radius:13px;box-shadow:0 16px 40px rgba(0,0,0,.22);padding:13px 16px;display:flex;align-items:center;gap:11px;animation:lf-float 4.5s ease-in-out infinite;\">\n          <div style=\"width:34px;height:34px;border-radius:9px;background:#ecfdf3;display:flex;align-items:center;justify-content:center;font-size:17px;\">✉️<\u002Fdiv>\n          <div><div style=\"font-size:12.5px;font-weight:700;color:#16263a;\">ส่งแจ้งเตือนการลาแล้ว<\u002Fdiv><div style=\"font-size:11px;color:#7a8aa0;\">ถึงผู้บริหาร · เมื่อสักครู่<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== STATS ===== -->\n  <sc-if value=\"{{ showStats }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"background:#fff;border-bottom:1px solid #eef2f7;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:30px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;\">\n      <div style=\"text-align:center;\"><div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:34px;color:#16263a;\">6<\u002Fdiv><div style=\"font-size:13.5px;color:#667085;margin-top:2px;\">โมดูลครบวงจร<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;\"><div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:34px;color:#16263a;\">QR<\u002Fdiv><div style=\"font-size:13.5px;color:#667085;margin-top:2px;\">รับงานหน้างานด้วยมือถือ<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;\"><div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:34px;color:#16263a;\">100%<\u002Fdiv><div style=\"font-size:13.5px;color:#667085;margin-top:2px;\">ทำงานบนเบราว์เซอร์<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center;\"><div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:34px;color:#16263a;\">อัตโนมัติ<\u002Fdiv><div style=\"font-size:13.5px;color:#667085;margin-top:2px;\">แจ้งเตือนทางอีเมล<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===== FEATURES ===== -->\n  <section id=\"features\" style=\"background:#f7f9fc;padding:84px 0;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 28px;\">\n      <div style=\"text-align:center;max-width:640px;margin:0 auto 50px;\">\n        <div style=\"color:#E8A33D;font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;font-family:'Sora',sans-serif;\">ความสามารถ<\u002Fdiv>\n        <h2 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:38px;color:#16263a;margin:10px 0 0;letter-spacing:-.01em;\">ทุกอย่างที่ธุรกิจขนส่งต้องใช้<\u002Fh2>\n        <p style=\"font-size:16.5px;color:#667085;line-height:1.6;margin:14px 0 0;\">ตั้งแต่จ่ายงานหน้างานจนถึงรายงานผู้บริหาร รวมไว้ในที่เดียว<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lf-feat-grid\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n        <div class=\"lf-card\" style=\"background:#fff;border:1px solid #e9eef5;border-radius:16px;padding:26px;\">\n          <div style=\"width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#1b3a5c,#2a5a8a);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;\">📋<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:18px;color:#16263a;margin-bottom:8px;\">จ่ายงาน &amp; ติดตามสถานะ<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:#5a6b7d;line-height:1.6;\">สร้างใบงาน จ่ายให้คนขับ ติดตามสถานะแบบเรียลไทม์ พร้อม QR Code ให้ พขร. รับงานหน้างานทันที<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lf-card\" style=\"background:#fff;border:1px solid #e9eef5;border-radius:16px;padding:26px;\">\n          <div style=\"width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#1b3a5c,#2a5a8a);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;\">🚛<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:18px;color:#16263a;margin-bottom:8px;\">ทะเบียนรถ &amp; เอกสาร<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:#5a6b7d;line-height:1.6;\">เก็บข้อมูลรถทั้งฟลีต แจ้งเตือนเอกสารใกล้หมดอายุ (พ.ร.บ./ประกัน/ภาษี) และตารางซ่อมบำรุง (PM)<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lf-card\" style=\"background:#fff;border:1px solid #e9eef5;border-radius:16px;padding:26px;\">\n          <div style=\"width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#1b3a5c,#2a5a8a);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;\">🧑‍✈️<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:18px;color:#16263a;margin-bottom:8px;\">ประวัติพนักงานขับรถ<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:#5a6b7d;line-height:1.6;\">ประวัติคนขับครบ ใบขับขี่ บันทึกการลา อุบัติเหตุ และผลงาน เก็บย้อนหลังได้ทั้งหมด<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lf-card\" style=\"background:#fff;border:1px solid #e9eef5;border-radius:16px;padding:26px;\">\n          <div style=\"width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#b07a1e,#E8A33D);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;\">🏢<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:18px;color:#16263a;margin-bottom:8px;\">ระบบบุคคลสำนักงาน<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:#5a6b7d;line-height:1.6;\">ทะเบียนพนักงานออฟฟิศแยกตามแผนก พร้อมบันทึกการลาและประวัติการทำงานครบถ้วน<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lf-card\" style=\"background:#fff;border:1px solid #e9eef5;border-radius:16px;padding:26px;\">\n          <div style=\"width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#b07a1e,#E8A33D);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;\">📊<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:18px;color:#16263a;margin-bottom:8px;\">รายงานประสิทธิภาพ<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:#5a6b7d;line-height:1.6;\">สรุปผลงานรายเดือน กำไร/ขาดทุนต่อเที่ยว และประสิทธิภาพรถรายคัน เห็นภาพรวมทันที<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lf-card\" style=\"background:#fff;border:1px solid #e9eef5;border-radius:16px;padding:26px;\">\n          <div style=\"width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#b07a1e,#E8A33D);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;\">✉️<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:18px;color:#16263a;margin-bottom:8px;\">แจ้งเตือนอัตโนมัติ<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:#5a6b7d;line-height:1.6;\">ส่งอีเ
