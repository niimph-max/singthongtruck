document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ont-weight: 600;\n  font-display: swap;\n  src: url(\"d7bfd409-0e3b-4015-b558-038e116c3ef2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"02595e92-60f2-4cba-88d9-f07d0562594c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* thai */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"08f847fc-e2e1-4389-a376-74a5972f1fdf\") format('woff2');\n  unicode-range: U+02D7, U+0303, U+0331, U+0E01-0E5B, U+200C-200D, U+25CC;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9b21fc43-5cad-4cc3-83ff-e7646808e5df\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4926425e-cfd0-4a96-bbd1-123dfbd1b439\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sarabun';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1eee2183-f807-492d-bb28-2d5f49c3be1e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{font-family:'Sarabun',sans-serif;background:#eef0f3;color:#1d2b3a;-webkit-font-smoothing:antialiased;}\n  ::placeholder{color:#98a2b3;}\n  input,select,button,textarea{font-family:'Sarabun',sans-serif;}\n  button{cursor:pointer;}\n  ::-webkit-scrollbar{width:9px;height:9px;}\n  ::-webkit-scrollbar-thumb{background:#cdd3da;border-radius:6px;border:2px solid transparent;background-clip:content-box;}\n  tbody tr:hover{background:#f7f9fb !important;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;min-height:100vh;width:100%;\">\n  <aside style=\"width:252px;flex:none;background:#16263a;color:#cdd7e1;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;\">\n    <div style=\"padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);\">\n      <div style=\"display:flex;gap:11px;align-items:center;margin-bottom:12px;\">\n        <div style=\"width:38px;height:38px;border-radius:9px;overflow:hidden;background:#fff;flex:none;\"><img src=\"2358ba5d-238f-46cb-8846-8d72cd8158ae\" style=\"width:100%;height:100%;object-fit:contain;\"><\u002Fdiv>\n        <div>\n          <div style=\"font-size:14.5px;font-weight:700;color:#fff;line-height:1.25;\">ระบบทะเบียน<\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#7c90a4;margin-top:1px;line-height:1.3;\">สิงห์ทองทรัคทรานสปอร์ต<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:5px;\">\n        <sc-for list=\"{{ tabs }}\" as=\"tab\" hint-placeholder-count=\"2\">\n          <button onclick=\"{{ tab.onClick }}\" style=\"{{ tab.btnStyle }}\">{{ tab.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:16px 14px;flex:1;overflow:auto;\">\n      <div style=\"font-size:11px;letter-spacing:.08em;color:#6f8499;font-weight:600;padding:0 8px 9px;\">{{ sideItemsTitle }}<\u002Fdiv>\n      <sc-for list=\"{{ sideItems }}\" as=\"s\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ s.onClick }}\" style=\"{{ s.btnStyle }}\">\n          <span style=\"display:flex;align-items:center;gap:9px;\"><span style=\"{{ s.dotStyle }}\"><\u002Fspan>{{ s.label }}<\u002Fspan>\n          <span style=\"{{ s.badgeStyle }}\">{{ s.count }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n\n      <div style=\"margin-top:22px;padding:0 8px 9px;font-size:11px;letter-spacing:.08em;color:#6f8499;font-weight:600;\">การแจ้งเตือน<\u002Fdiv>\n      <button onclick=\"{{ onShowAlerts }}\" style=\"{{ alertCardStyle }}\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font-size:13px;font-weight:600;color:#fde0d8;\">เอกสารต้องดำเนินการ<\u002Fspan>\n          <span style=\"font-size:18px;font-weight:700;color:#fff;\">{{ alertCount }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#e6a99c;margin-top:3px;\">หมดอายุ {{ expiredCount }} · ใกล้หมดอายุ {{ soonCount }}<\u002Fdiv>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"padding:13px 18px;border-top:1px solid rgba(255,255,255,.08);\">\n      <div style=\"font-size:12px;color:#7c90a4;margin-bottom:7px;\">วันที่ {{ todayTH }}<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:6px;\">\n        <span style=\"{{ syncDotStyle }}\"><\u002Fspan>\n        <span style=\"font-size:11px;color:#7c90a4;\">{{ syncText }}<\u002Fspan>\n        <button onclick=\"{{ onSync }}\" style=\"margin-left:auto;background:none;border:none;color:#6b8299;font-size:15px;cursor:pointer;padding:0;line-height:1;\" title=\"รีเฟรชข้อมูล\">↻<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main style=\"flex:1;min-width:0;height:100vh;overflow:auto;\">\n\n    <!-- ===== DRIVER LIST ===== -->\n    <sc-if value=\"{{ isList }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:26px 30px 60px;max-width:1180px;\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;\">\n        <div>\n          <h1 style=\"margin:0;font-size:22px;font-weight:700;color:#16263a;\">{{ listTitle }}<\u002Fh1>\n          <div style=\"font-size:13px;color:#667085;margin-top:3px;\">แสดง {{ rowCount }} จากทั้งหมด {{ totalCount }} คน<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:center;\">\n          <div style=\"position:relative;\">\n            <input value=\"{{ search }}\" oninput=\"{{ onSearch }}\" placeholder=\"ค้นหา ชื่อ / รหัส / เลขบัตร / ที่อยู่\" style=\"width:290px;padding:9px 12px 9px 36px;border:1px solid #d0d5dd;border-radius:9px;font-size:14px;background:#fff;color:#1d2b3a;\">\n            <span style=\"position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#98a2b3;font-size:15px;\">⌕<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ onAddNew }}\" style=\"padding:9px 15px;background:#2f6fb0;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;white-space:nowrap;\">+ เพิ่มพนักงาน<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:18px;\">\n        <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ s.onClick }}\" style=\"{{ s.cardStyle }}\">\n            <div style=\"font-size:26px;font-weight:700;line-height:1;color:{{ s.fg }}\">{{ s.count }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#667085;margin-top:6px;\">{{ s.label }}<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showAlertBanner }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ onShowAlerts }}\" style=\"width:100%;text-align:left;display:flex;align-items:center;gap:12px;padding:12px 15px;background:#fffaeb;border:1px solid #fde9bf;border-radius:10px;margin-bottom:14px;\">\n          <span style=\"width:24px;height:24px;border-radius:50%;background:#f5a623;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;\">!<\u002Fspan>\n          <span style=\"font-size:13.5px;color:#7a4d00;\">{{ alertBannerText }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n\n      <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,.04);\">\n        <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"8\">\n              <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;\">\n          <thead>\n            <tr style=\"background:#f8fafc;\">\n              <th style=\"text-align:left;padding:11px 15px;font-size:12px;font-weight:600;color:#667085;border-bottom:1px solid #e4e7ec;\">รหัสพนักงาน<\u002Fth>\n              <th style=\"text-align:left;padding:11px 15px;font-size:12px;font-weight:600;color:#667085;border-bottom:1px solid #e4e7ec;\">ชื่อพนักงานขับรถ<\u002Fth>\n              <th style=\"text-align:left;padding:11px 15px;font-size:12px;font-weight:600;color:#667085;border-bottom:1px solid #e4e7ec;\">ฟลีต<\u002Fth>\n              <th style=\"text-align:left;padding:11px 15px;font-size:12px;font-weight:600;color:#667085;border-bottom:1px solid #e4e7ec;\">ใบขับขี่หมดอายุ<\u002Fth>\n              <th style=\"text-align:left;padding:11px 15px;font-size:12px;font-weight:600;color:#667085;border-bottom:1px solid #e4e7ec;\">บัตร ปชช.หมดอายุ<\u002Fth>\n              <th style=\"text-align:left;padding:11px 15px;font-size:12px;font-weight:600;color:#667085;border-bottom:1px solid #e4e7ec;\">สถานะเอกสาร<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr onclick=\"{{ r.onOpen }}\" style=\"cursor:pointer;border-bottom:1px solid #f0f2f5;\">\n                <td style=\"padding:12px 15px;font-size:13px;color:#475467;\">{{ r.codeFmt }}<\u002Ftd>\n                <td style=\"padding:12px 15px;\">\n                  <div style=\"font-size:14px;font-weight:600;color:#16263a;\">{{ r.name }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#98a2b3;margin-top:1px;\">ประเภทรถ {{ r.type }}<\u002Fdiv>\n                <\u002Ftd>\n                <td style=\"padding:12px 15px;\"><span style=\"{{ r.fleetStyle }}\">{{ r.fleet }}<\u002Fspan><\u002Ftd>\n                <td style=\"padding:12px 15px;font-size:13px;\"><span style=\"{{ r.licStyle }}\">{{ r.licText }}<\u002Fspan><\u002Ftd>\n                <td style=\"padding:12px 15px;font-size:13px;\"><span style=\"{{ r.idStyle }}\">{{ r.idText }}<\u002Fspan><\u002Ftd>\n                <td style=\"padding:12px 15px;\"><span style=\"{{ r.statusStyle }}\">{{ r.statusLabel }}<\u002Fspan><\u002Ftd>\n              <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n        <sc-if value=\"{{ emptyVisible }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:48px;text-align:center;color:#98a2b3;font-size:14px;\">ไม่พบข้อมูลที่ตรงกับเงื่อนไข<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== DRIVER PROFILE ===== -->\n    <sc-if value=\"{{ isProfile }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:22px 28px 60px;max-width:1060px;\">\n      <button onclick=\"{{ onBack }}\" style=\"background:none;border:none;color:#2f6fb0;font-size:14px;font-weight:600;padding:6px 0;margin-bottom:12px;\">‹ กลับไปทะเบียน<\u002Fbutton>\n      <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:22px;margin-bottom:16px;\">\n        <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n          <div style=\"width:90px;height:112px;flex:none;border-radius:10px;overflow:hidden;border:1px solid #e4e7ec;background:#f4f6f8;display:flex;align-items:center;justify-content:center;\">\n            <sc-if value=\"{{ hasPhoto }}\" hint-placeholder-val=\"{{ false }}\">{{ photoNode }}<\u002Fsc-if>\n            <sc-if value=\"{{ noPhoto }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:11px;color:#b0b8c2;text-align:center;line-height:1.4;\">รูปถ่าย<br>พนักงาน<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:0;\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n              <div>\n                <h1 style=\"margin:0;font-size:23px;font-weight:700;color:#16263a;\">{{ sel.name }}<\u002Fh1>\n                <div style=\"font-size:13.5px;color:#667085;margin-top:4px;\">รหัสพนักงาน {{ sel.codeFmt }} · ประเภทรถ {{ sel.type }}<\u002Fdiv>\n                <div style=\"display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;\">\n                  <span style=\"{{ sel.fleetStyle }}\">ฟลีต{{ sel.fleet }}<\u002Fspan>\n                  <span style=\"{{ sel.statusStyle }}\">เอกสาร: {{ sel.statusLabel }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;\">\n                <button onclick=\"{{ onEdit }}\" style=\"padding:8px 15px;background:#2f6fb0;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;\">แก้ไข<\u002Fbutton>\n                <button onclick=\"{{ onDelete }}\" style=\"padding:8px 13px;background:#fff;color:#b42318;border:1px solid #f1c5be;border-radius:8px;font-size:13px;font-weight:600;\">ลบ<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;\">\n        <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:20px;\">\n          <div style=\"font-size:12.5px;font-weight:7 HasPhoto }}\" hint-placeholder-val=\"{{ false }}\">{{ truckPhotoNode }}<\u002Fsc-if>\n                  <sc-if value=\"{{ truckNoPhoto }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"width:72px;height:72px;background:#1b2a3a;display:flex;align-items:center;justify-content:center;\">\n                      <svg width=\"32\" height=\"28\" viewBox=\"0 0 32 28\" fill=\"none\"><rect x=\"1\" y=\"8\" width=\"24\" height=\"14\" rx=\"2\" fill=\"#5b9bd5\"><\u002Frect><rect x=\"25\" y=\"12\" width=\"6\" height=\"10\" rx=\"1\" fill=\"#4f7bb5\"><\u002Frect><circle cx=\"7\" cy=\"24\" r=\"3\" fill=\"#fff\"><\u002Fcircle><circle cx=\"19\" cy=\"24\" r=\"3\" fill=\"#fff\"><\u002Fcircle><circle cx=\"27\" cy=\"24\" r=\"2.5\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <input type=\"file\" accept=\"image/*\" onchange=\"{{ onTruckProfilePhoto }}\" style=\"display:none;\">\n              <\u002Flabel>\n              <span style=\"font-size:11px;color:#2f6fb0;font-weight:600;\">{{ truckPhotoLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div>\n              <h1 style=\"margin:0;font-size:26px;font-weight:700;color:#16263a;letter-spacing:.02em;\">{{ truckSel.plate }}<\u002Fh1>\n              <div style=\"font-size:13.5px;color:#667085;margin-top:3px;\">{{ truckSel.truckType }} · {{ truckSel.maker }}{{ truckSel.modelSuffix }}<\u002Fdiv>\n              <div style=\"display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;\">\n                <span style=\"{{ truckSel.deptStyle }}\">{{ truckSel.dept }}<\u002Fspan>\n                <span style=\"{{ truckSel.statusStyle }}\">เอกสาร: {{ truckSel.statusLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;\">\n            <button onclick=\"{{ onTruckEdit }}\" style=\"padding:8px 15px;background:#2f6fb0;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;\">แก้ไข<\u002Fbutton>\n            <button onclick=\"{{ onTruckDelete }}\" style=\"padding:8px 13px;background:#fff;color:#b42318;border:1px solid #f1c5be;border-radius:8px;font-size:13px;font-weight:600;\">ลบ<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;\">\n        <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:20px;\">\n          <div style=\"font-size:12.5px;font-weight:700;color:#16263a;margin-bottom:14px;\">ข้อมูลรถ<\u002Fdiv>\n          <sc-for list=\"{{ truckInfoRows }}\" as=\"row\" hint-placeholder-count=\"9\">\n            <div style=\"display:flex;padding:8px 0;border-bottom:1px solid #f2f4f7;\">\n              <div style=\"width:135px;flex:none;font-size:13px;color:#98a2b3;\">{{ row.label }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#1d2b3a;flex:1;\">{{ row.value }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:20px;\">\n          <div style=\"font-size:12.5px;font-weight:700;color:#16263a;margin-bottom:14px;\">ข้อมูลเจ้าของรถ<\u002Fdiv>\n          <sc-for list=\"{{ truckOwnerRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;padding:8px 0;border-bottom:1px solid #f2f4f7;\">\n              <div style=\"width:135px;flex:none;font-size:13px;color:#98a2b3;\">{{ row.label }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#1d2b3a;flex:1;\">{{ row.value }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:20px;\">\n        <div style=\"font-size:12.5px;font-weight:700;color:#16263a;margin-bottom:14px;\">เอกสารแนบ<\u002Fdiv>\n        <sc-for list=\"{{ truckDocs }}\" as=\"d\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid #f2f4f7;\">\n            <div style=\"width:38px;height:38px;border-radius:9px;background:{{ d.iconBg }};color:{{ d.iconFg }};display:flex;align-items:center;justify-content:center;font-size:17px;flex:none;\">▦<\u002Fdiv>\n            <div style=\"flex:1;min-width:0;\">\n              <div style=\"font-size:14px;font-weight:600;color:#16263a;\">{{ d.label }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#98a2b3;margin-top:2px;\">{{ d.fileText }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right;flex:none;\">\n              <div style=\"font-size:11.5px;color:#98a2b3;\">{{ d.dateLabel }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;font-weight:600;margin-top:2px;{{ d.dateColor }}\">{{ d.dateText }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:110px;text-align:right;flex:none;\"><span style=\"{{ d.chipStyle }}\">{{ d.chipLabel }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== TRUCK FORM ===== -->\n    <sc-if value=\"{{ isTruckForm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:22px 28px 70px;max-width:860px;\">\n      <button onclick=\"{{ onCancelTruck }}\" style=\"background:none;border:none;color:#2f6fb0;font-size:14px;font-weight:600;padding:6px 0;margin-bottom:12px;\">‹ ยกเลิก<\u002Fbutton>\n      <h1 style=\"margin:0 0 3px;font-size:22px;font-weight:700;color:#16263a;\">{{ truckFormTitle }}<\u002Fh1>\n      <div style=\"font-size:13px;color:#667085;margin-bottom:20px;\">กรอกข้อมูลรถบรรทุกและแนบเอกสารพร้อมวันหมดอายุ<\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:22px;margin-bottom:16px;\">\n        <div style=\"font-size:12.5px;font-weight:700;color:#16263a;margin-bottom:16px;\">ข้อมูลรถ<\u002Fdiv>\n        <div style=\"display:flex;gap:20px;\">\n          <div style=\"flex:none;width:112px;text-align:center;\">\n            <div style=\"width:112px;height:90px;border-radius:11px;overflow:hidden;border:1px solid #e4e7ec;background:#f4f6f8;display:flex;align-items:center;justify-content:center;margin-bottom:9px;\">\n              <sc-if value=\"{{ truckDraftHasPhoto }}\" hint-placeholder-val=\"{{ false }}\">{{ truckDraftPhotoNode }}<\u002Fsc-if>\n              <sc-if value=\"{{ truckDraftNoPhoto }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:11px;color:#b0b8c2;text-align:center;line-height:1.6;\">รูปถ่าย<br>รถ<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <label style=\"display:inline-block;padding:6px 12px;background:#eef4fb;color:#2f6fb0;border:1px solid #cfe0f2;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;\">\n              เลือกรูป<input type=\"file\" accept=\"image/*\" onchange=\"{{ onTruckPhoto }}\" style=\"display:none;\">\n            <\u002Flabel>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:13px;\">\n          <div style=\"grid-column:1 / -1;\">\n            <label style=\"display:block;font-size:12px;color:#475467;font-weight:600;margin-bottom:5px;\">ทะเบียนรถ *<\u002Flabel>\n            <input value=\"{{ draft.plate }}\" oninput=\"{{ onPlate }}\" placeholder=\"เช่น กข 1234 ระยอง\" style=\"width:100%;padding:9px 11px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;color:#1d2b3a;background:#fff;\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:12px;color:#475467;font-weight:600;margin-bottom:5px;\">ชนิดรถ<\u002Flabel>\n            <select value=\"{{ draft.truckType }}\" onchange=\"{{ onTruckType }}\" style=\"width:100%;padding:9px 11px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;color:#1d2b3a;background:#f
