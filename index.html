document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n        <div style=\"font-size:12.5px;font-weight:700;color:#16263a;white-space:nowrap;\">👤 พนักงานขับรถประจำรถ<\u002Fdiv>\n        <select value=\"{{ truckAssignedVal }}\" onchange=\"{{ onTruckAssignedDriver }}\" style=\"flex:1;min-width:220px;padding:9px 11px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;color:#1d2b3a;background:#fff;\">\n          <option value=\"\">— ยังไม่กำหนด —<\u002Foption>\n          <sc-for list=\"{{ truckDriverOpts }}\" as=\"o\" hint-placeholder-count=\"5\"><option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n        <sc-if value=\"{{ truckAssignedIsGuess }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11.5px;color:#b54708;\">⚡ ระบบเดาจากประวัติ — เลือกเพื่อยืนยัน/แก้ไข<\u002Fspan><\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:20px;margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;\">\n          <span style=\"font-size:12.5px;font-weight:700;color:#16263a;\">🔧 ซ่อมบำรุงตามระยะ (PM)<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:8px;\">\n            <span style=\"font-size:12px;color:#667085;\">เลขไมล์ปัจจุบัน<\u002Fspan>\n            <input type=\"number\" value=\"{{ truckOdoVal }}\" oninput=\"{{ onTruckOdo }}\" placeholder=\"0\" style=\"width:120px;padding:7px 10px;border:1px solid #d0d5dd;border-radius:7px;font-size:13px;text-align:right;\">\n            <span style=\"font-size:12px;color:#98a2b3;\">กม.<\u002Fspan>\n            <button onclick=\"{{ onSaveOdo }}\" style=\"padding:7px 13px;background:#2f6fb0;color:#fff;border:none;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;\">บันทึก<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.6fr .9fr 1.3fr 1fr 92px;background:#f8fafc;border:1px solid #eef1f4;border-radius:8px 8px 0 0;\">\n          <div style=\"padding:9px 12px;font-size:11.5px;font-weight:600;color:#667085;\">รายการ<\u002Fdiv>\n          <div style=\"padding:9px 12px;font-size:11.5px;font-weight:600;color:#667085;\">รอบ<\u002Fdiv>\n          <div style=\"padding:9px 12px;font-size:11.5px;font-weight:600;color:#667085;\">ทำล่าสุด<\u002Fdiv>\n          <div style=\"padding:9px 12px;font-size:11.5px;font-weight:600;color:#667085;\">สถานะ<\u002Fdiv>\n          <div><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #eef1f4;border-top:none;border-radius:0 0 8px 8px;\">\n          <sc-for list=\"{{ pmRows }}\" as=\"p\" hint-placeholder-count=\"8\">\n            <div style=\"display:grid;grid-template-columns:1.6fr .9fr 1.3fr 1fr 92px;border-bottom:1px solid #f4f6f8;align-items:center;\">\n              <div style=\"padding:10px 12px;font-size:13px;font-weight:600;color:#1d2b3a;\">{{ p.label }}<\u002Fdiv>\n              <div style=\"padding:10px 12px;font-size:12px;color:#667085;\">{{ p.intvText }}<\u002Fdiv>\n              <div style=\"padding:10px 12px;font-size:12px;color:#475467;\">{{ p.lastText }}<\u002Fdiv>\n              <div style=\"padding:10px 12px;\"><span style=\"{{ p.chipStyle }}\">{{ p.statusLabel }}<\u002Fspan><div style=\"font-size:10.5px;color:#98a2b3;margin-top:2px;\">{{ p.dueText }}<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ p.onMark }}\" title=\"บันทึกว่าทำแล้ว\" style=\"margin:6px;padding:6px 8px;background:#eef4ff;color:#175cd3;border:1px solid #d3e2fb;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;\">✓ ทำแล้ว<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:20px;margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;\">\n          <span style=\"font-size:12.5px;font-weight:700;color:#16263a;\">ประวัติการซ่อมบำรุง<\u002Fspan>\n          <span style=\"font-size:11px;color:#98a2b3;\">เพิ่มบันทึกได้ที่เมนู “บันทึกซ่อมบำรุง”<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ maintFormOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#f8fafc;border:1px solid #e4e7ec;border-radius:10px;padding:15px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n            <div>\n              <label style=\"display:block;font-size:11.5px;color:#667085;font-weight:600;margin-bottom:4px;\">วันที่<\u002Flabel>\n              <input type=\"date\" value=\"{{ maintDraftDate }}\" oninput=\"{{ onMaintDate }}\" style=\"width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:7px;font-size:13px;background:#fff;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11.5px;color:#667085;font-weight:600;margin-bottom:4px;\">ประเภท<\u002Flabel>\n              <select value=\"{{ maintDraftType }}\" onchange=\"{{ onMaintType }}\" style=\"width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:7px;font-size:13px;background:#fff;\">\n                <option value=\"ซ่อมบำรุงทั่วไป\">🔧 ซ่อมบำรุงทั่วไป<\u002Foption>\n                <option value=\"เปลี่ยนยาง\">🔄 เปลี่ยนยาง<\u002Foption>\n                <option value=\"เปลี่ยนน้ำมันเครื่อง\">🛢️ เปลี่ยนน้ำมันเครื่อง<\u002Foption>\n                <option value=\"อุบัติเหตุ/ซ่อมตัวถัง\">💥 อุบัติเหตุ/ซ่อมตัวถัง<\u002Foption>\n                <option value=\"ระบบไฟฟ้า\">⚡ ระบบไฟฟ้า<\u002Foption>\n                <option value=\"ตรวจเช็คตามระยะ\">📋 ตรวจเช็คตามระยะ<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"grid-column:1 / -1;\">\n              <label style=\"display:block;font-size:11.5px;color:#667085;font-weight:600;margin-bottom:4px;\">รายละเอียด<\u002Flabel>\n              <textarea value=\"{{ maintDraftDetail }}\" oninput=\"{{ onMaintDetail }}\" placeholder=\"ระบุรายละเอียดการซ่อม...\" style=\"width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:7px;font-size:13px;background:#fff;min-height:160px;resize:vertical;\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11.5px;color:#667085;font-weight:600;margin-bottom:4px;\">ค่าใช้จ่าย (บาท)<\u002Flabel>\n              <input type=\"number\" value=\"{{ maintDraftCost }}\" oninput=\"{{ onMaintCost }}\" placeholder=\"0\" style=\"width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:7px;font-size:13px;background:#fff;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11.5px;color:#667085;font-weight:600;margin-bottom:4px;\">อู่/ผู้ดำเนินการ<\u002Flabel>\n              <input value=\"{{ maintDraftBy }}\" oninput=\"{{ onMaintBy }}\" placeholder=\"ชื่ออู่หรือผู้ดำเนินการ\" style=\"width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:7px;font-size:13px;background:#fff;\">\n            <\u002Fdiv>\n            <div style=\"grid-column:1 / -1;display:flex;gap:8px;\">\n              <button onclick=\"{{ onSaveMaint }}\" style=\"flex:1;padding:8px 0;background:#2f6fb0;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;\">บันทึก<\u002Fbutton>\n              <button onclick=\"{{ onCloseMaintForm }}\" style=\"flex:1;padding:8px 0;background:#fff;color:#475467;border:1px solid #d0d5dd;border-radius:7px;font-size:13px;font-weight:600;\">ยกเลิก<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ maintEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:24px;text-align:center;color:#b0b8c2;font-size:13px;\">ยังไม่มีบันทึกการซ่อมบำรุง<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ maintItems }}\" as=\"m\" hint-placeholder-count=\"0\">\n          <div style=\"display:flex;gap:12px;padding:13px 0;border-bottom:1px solid #f2f4f7;align-items:flex-start;\">\n            <div style=\"width:36px;height:36px;border-radius:9px;background:#f4f6f8;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;\">{{ m.icon }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:0;\">\n              <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;\">\n                <span style=\"{{ m.chipStyle }}\">{{ m.type }}<\u002Fspan>\n                <span style=\"font-size:12px;color:#98a2b3;\">{{ m.dateFmt }}<\u002Fspan>\n                <sc-if value=\"{{ m.costFmt }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;font-weight:600;color:#16263a;\">{{ m.costFmt }}<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ m.by }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;color:#b0b8c2;\">{{ m.by }}<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#1d2b3a;\">{{ m.detail }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ m.onDelete }}\" style=\"background:none;border:none;color:#d0d5dd;font-size:15px;cursor:pointer;padding:4px;flex:none;\" title=\"ลบ\">✕<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:20px;\">\n        <div style=\"font-size:12.5px;font-weight:700;color:#16263a;margin-bottom:14px;\">เอกสารแนบ<\u002Fdiv>\n        <sc-for list=\"{{ truckDocs }}\" as=\"d\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid #f2f4f7;\">\n            <div style=\"width:38px;height:38px;border-radius:9px;background:{{ d.iconBg }};color:{{ d.iconFg }};display:flex;align-items:center;justify-content:center;font-size:17px;flex:none;\">▦<\u rgin-bottom:18px;\">\n        <div style=\"font-size:14px;font-weight:700;color:#16263a;margin-bottom:14px;\">ประสิทธิภาพน้ำมัน (กม./ลิตร) — เป้า {{ ovTargetText }}<\u002Fdiv>\n        <sc-for list=\"{{ ovEffBars }}\" as=\"b\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;align-items:center;gap:14px;padding:7px 0;\">\n            <div style=\"width:140px;font-size:13px;color:#1d2b3a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ b.name }}<\u002Fdiv>\n            <div style=\"flex:1;height:10px;background:#eef1f4;border-radius:6px;overflow:hidden;\"><div style=\"height:100%;border-radius:6px;width:{{ b.w }}%;background:{{ b.barColor }};\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:44px;text-align:right;font-weight:700;color:#16263a;\">{{ b.val }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:14px;overflow:hidden;\">\n        <div style=\"padding:14px 18px;font-size:14px;font-weight:700;color:#16263a;border-bottom:1px solid #eef1f4;\">ประสิทธิภาพรายคัน<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.4fr .6fr 1fr 1fr 1fr 1fr .9fr;background:#f8fafc;border-bottom:1px solid #eef1f4;\">\n          <div style=\"padding:10px 14px;font-size:11.5px;font-weight:600;color:#667085;\">ทะเบียนรถ<\u002Fdiv>\n          <div style=\"padding:10px 14px;font-size:11.5px;font-weight:600;color:#667085;text-align:right;\">เที่ยว<\u002Fdiv>\n          <div style=\"padding:10px 14px;font-size:11.5px;font-weight:600;color:#667085;text-align:right;\">รายได้<\u002Fdiv>\n          <div style=\"padding:10px 14px;font-size:11.5px;font-weight:600;color:#667085;text-align:right;\">ระยะทาง<\u002Fdiv>\n          <div style=\"padding:10px 14px;font-size:11.5px;font-weight:600;color:#667085;text-align:right;\">ค่าน้ำมัน<\u002Fdiv>\n          <div style=\"padding:10px 14px;font-size:11.5px;font-weight:600;color:#667085;text-ali a;font-weight:600;\">{{ r.bill }}<\u002Ftd>\n                    <td style=\"padding:8px 8px;text-align:right;color:#475467;\">{{ r.distText }}<\u002Ftd>\n                    <td style=\"padding:8px 8px;text-align:right;color:#b54708;\">{{ r.emptyDistText }}<\u002Ftd>\n                    <td style=\"padding:8px 8px;text-align:right;color:#2f6fb0;font-weight:600;\">{{ r.usedText }}<\u002Ftd>\n                    <td style=\"padding:8px 8px;text-align:left;color:#475467;\">{{ r.advText }}<\u002Ftd>\n                    <td style=\"padding:8px 8px;text-align:right;color:#16263a;font-weight:600;\">{{ r.refillText }}<\u002Ftd>\n                    <td style=\"padding:8px 8px;text-align:right;color:#98a2b3;\">{{ r.openingText }}<\u002Ftd>\n                    <td style=\"padding:8px 8px;text-align:right;color:#98a2b3;\">{{ r.closingText }}<\u002Ftd>\n                    <td style=\"padding:8px 8px;text-align:right;color:#475467;\">{{ r.excessText }}<\u002Ftd>\n                    <td style=\"padding:8px 14px;\"><sc-if value=\"{{ r.fuelOver }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#b42318;font-weight:700;\">{{ r.fuelFlag }}<\u002Fspan><\u002Fsc-if><\u002Ftd>\n                  <\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== EFFICIENCY: SETTLE (ปิดงาน & ค่าใช้จ่าย) ===== -->\n    <sc-if value=\"{{ isEffSettle }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:26px 30px 60px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;\">\n        <div>\n          <h1 style=\"margin:0;font-size:22px;font-weight:700;color:#16263a;\">🧾 ปิดงาน &amp; บันทึกค่าใช้จ่าย<\u002Fh1>\n          <div style=\"font-size:13px;color:#667085;margin-top:3px;\">เฉพาะรถบริษัทที่ พขร. ส่งเอกสารแล้ว · รับเอกสาร → ส่งบัญชี/ลูกค้า → ลงค่าใช้จ่าย<\u002Fdiv>\n        <\ rder:1px solid #c6ebd4;border-radius:12px;padding:14px 18px;min-width:140px;\">\n          <div style=\"font-size:24px;font-weight:700;line-height:1;color:#067647;\">{{ settleDone }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:#667085;margin-top:6px;\">🟢 เสร็จสมบูรณ์<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#eff4ff;border:1px solid #d3e0f7;border-radius:12px;padding:14px 18px;min-width:160px;\">\n          <div style=\"font-size:24px;font-weight:700;line-height:1;color:#175cd3;\">{{ settleTotalRev }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:#667085;margin-top:6px;\">ค่าขนส่งรวมเดือนนี้<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e4e7ec;border-radius:12px;padding:14px 18px;min-width:160px;\">\n          <div style=\"font-size:24px;font-weight:700;line-height:1;color:#b54708;\">{{ settleTotalExp }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:#667085;margin-top:6px;\">ค่าใช้จ่ายรวมที่ลงแล้ว<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;\">\n        <select value=\"{{ effSettleTruck }}\" onchange=\"{{ onEffSettleTruck }}\" style=\"padding:8px 12px;border:1px solid #d0d5dd;border-radius:8px;font-size:13px;color:#1d2b3a;background:#fff;\">\n          <sc-for list=\"{{ settleTruckOptions }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fselect>\n        <select value=\"{{ effSettleStatus }}\" onchange=\"{{ onEffSettleStatus }}\" style=\"padding:8px 12px;border:1px solid #d0d5dd;border-radius:8px;font-size:13px;color:#1d2b3a;background:#fff;\">\n          <option value=\"all\">ทุกสถานะ<\u002Foption>\n          <option value=\"awaitDocs\">🔴 รอปิดเอกสาร<\u002Foption>\n          <option value=\"awaitExp\">🟠 รอลงค่าใช้จ่าย<\u002Foption>\n          <option value=\"done\">🟢 เสร็จสมบูรณ์<\ ize:14px;font-weight:700;color:#16263a;\">{{ r.bill }}<\u002Fdiv><div style=\"font-size:11px;color:#98a2b3;margin-top:2px;\">ใบงาน {{ r.jobNo }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"padding:11px 14px;font-size:12.5px;color:#344054;line-height:1.4;\">{{ r.plate }}<br><span style=\"color:#98a2b3;\">{{ r.driver }}<\u002Fspan><\u002Fdiv>\n                <div style=\"padding:11px 14px;font-size:12.5px;color:#475467;\">{{ r.customer }}<\u002Fdiv>\n                <div style=\"padding:11px 14px;font-size:12px;color:#667085;line-height:1.4;\">{{ r.route }}<sc-if value=\"{{ r.distanceText }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:10.5px;color:#2f6fb0;margin-top:2px;\">📏 {{ r.distanceText }}<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n                <div style=\"padding:7px 9px;\"><input type=\"number\" defaultvalue=\"{{ r.rateRaw }}\" onblur=\"{{ r.onRateCommit }}\" placeholder=\"ราคา/ตัน\" style=\"width:100%;padding:6px 8px;border:1px solid #cdd5df;border-radius:7px;font-size:13px;font-weight:600;color:#16263a;text-align:right;box-sizing:border-box;background:#fff;\"><div style=\"font-size:10px;color:#98a2b3;margin-top:3px;text-align:right;line-height:1.3;\">{{ r.weightText }}<br>= <b style=\"color:#175cd3;\">{{ r.revenueText }}<\u002Fb><\u002Fdiv><\u002Fdiv>\n                <div style=\"padding:11px 14px;font-size:13px;color:#b54708;font-weight:600;text-align:right;\">{{ r.expense }}<\u002Fdiv>\n                <div style=\"padding:11px 14px;\"><span style=\"{{ r.statusStyle }}\">{{ r.statusLabel }}<\u002Fspan><\u002Fdiv>\n                <div style=\"padding:9px 12px;text-align:right;display:flex;gap:5px;justify-content:flex-end;\"><button onclick=\"{{ r.onOpen }}\" style=\"padding:6px 12px;background:#2f6fb0;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;\">เปิด<\u002Fbutton><button onclick=\"{{ r.onReopen }}\" title=\"ถอยงานกลับไปหน้าจ่ายงาน\" style=\"padding:6px 9px;background:#fff4e5;color:#b5470 font-weight:700;color:#16263a;margin-bottom:10px;\">① รับเอกสาร &amp; ปิดงานจ่ายงาน<\u002Fdiv>\n            <sc-if value=\"{{ sdDocsOpen }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:12px;color:#98a2b3;margin-bottom:10px;\">หน.จ่ายงานได้รับเอกสารจาก พขร. แล้วส่งต่อไปที่ไหน<\u002Fdiv>\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n                <button onclick=\"{{ onSettleDocsAcct }}\" style=\"flex:1;min-width:120px;padding:11px;background:#eff4ff;color:#175cd3;border:1px solid #d3e0f7;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;\">📊 ส่งบัญชี<\u002Fbutton>\n                <button onclick=\"{{ onSettleDocsCust }}\" style=\"flex:1;min-width:120px;padding:11px;background:#eff4ff;color:#175cd3;border:1px solid #d3e0f7;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;\">🏢 ส่งลูกค้า<\u002Fbutton>\n                <button onclick=\"{{ onSettleDocsBoth }}\" style=\"flex:1;min-width:120px;padding:11px;background:#067647;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;\">✓ ส่งทั้งสอง<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ sdDocsClosed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;background:#ecfdf3;border:1px solid #c6ebd4;border-radius:9px;padding:11px 13px;\">\n                <div style=\"font-size:13px;font-weight:600;color:#067647;\">✓ ปิดเอกสารแล้ว · {{ sdDocsTarget }}<\u002Fdiv>\n                <button onclick=\"{{ onSettleUndoDocs }}\" style=\"background:none;border:none;color:#b42318;font-size:12px;font-weight:600;cursor:pointer;\">แก้ไข<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"border:1px solid #e4e7ec;border-radius:12px;padding:16px;margin-bottom:16px;\">\n            <div style=\"font-size:13px;font-weight:700;color:#16263a;margin-bottom:12px;\">② บันทึกค่าใช้จ่าย (รถบริษัท)<\u002Fdiv>\n            <div style=\"background:#eff4ff;border:1px solid #d3e0f7;border-radius:9px;padding:12px;margin-bottom:12px;\">\n              <div style=\"display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;\">\n                <div style=\"flex:1;min-width:130px;\">\n                  <label style=\"font-size:11.5px;font-weight:700;color:#175cd3;display:block;margin-bottom:4px;\">💰 ราคา / ตัน (บาท)<\u002Flabel>\n                  <input type=\"number\" value=\"{{ sd.ratePerTon }}\" oninput=\"{{ onSettleRate }}\" placeholder=\"เช่น 307\" style=\"width:100%;padding:9px 11px;border:1px solid #2f6fb0;border-radius:8px;font-size:15px;font-weight:600;color:#16263a;box-sizing:border-box;\">\n                <\u002Fdiv>\n                <div style=\"font-size:12px;color:#475467;line-height:1.7;min-width:150px;\">\n                  น้ำหนัก <b style=\"color:#16263a;\">{{ sdWeightText }}<\u002Fb> · ระยะทาง <b style=\"color:#16263a;\">{{ sdDistanceText }}<\u002Fb><br>\n                  ค่าขนส่ง = <b style=\"color:#175cd3;font-size:15px;\">{{ sdRevenueText }}<\u002Fb>\n                <\u002Fdiv>\n                <div style=\"min-width:130px;\">\n                  <label style=\"font-size:11.5px;font-weight:700;color:#b54708;display:block;margin-bottom:4px;\">🛣️ ระยะทางเที่ยวเปล่า (กม.)<\u002Flabel>\n                  <input type=\"number\" value=\"{{ sd.emptyDistance }}\" oninput=\"{{ onSettleEmptyDist }}\" placeholder=\"0\" style=\"width:100%;padding:9px 11px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;color:#1d2b3a;box-sizing:border-box;\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n              <div>\n                <label style=\"font-size:11.5px;font-weight:600;color:#667085;display:block;margin-bottom:4px;\">น้ำมัน/แก๊ส (ลิตร)<\u002Flabel>\n a;box-sizing:border-box;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:11.5px;font-weight:600;color:#667085;display:block;margin-bottom:4px;\">ค่าซ่อมฉุกเฉิน (บาท)<\u002Flabel>\n                <input type=\"number\" value=\"{{ sd.repair }}\" oninput=\"{{ onSettleRepair }}\" placeholder=\"0\" style=\"width:100%;padding:8px 11px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;color:#1d2b3a;box-sizing:border-box;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:11.5px;font-weight:600;color:#667085;display:block;margin-bottom:4px;\">ค่าตำรวจ/ค่าปรับ (บาท)<\u002Flabel>\n                <input type=\"number\" value=\"{{ sd.police }}\" oninput=\"{{ onSettlePolice }}\" placeholder=\"0\" style=\"width:100%;padding:8px 11px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;color:#1d2b3a;box-sizing:border-box;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:11.5px;font-weight:600;color:#667085;display:block;margin-bottom:4px;\">เบ็ดเตล็ด (บาท)<\u002Flabel>\n                <input type=\"number\" value=\"{{ sd.misc }}\" oninput=\"{{ onSettleMisc }}\" placeholder=\"0\" style=\"width:100%;padding:8px 11px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;color:#1d2b3a;box-sizing:border-box;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <label style=\"display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer;font-size:13px;font-weight:600;color:#16263a;\">\n              <input type=\"checkbox\" checked=\"{{ sdExpenseDone }}\" onchange=\"{{ onSettleExpenseDone }}\" style=\"width:17px;height:17px;cursor:pointer;\">\n              ✓ ยืนยันค่าใช้จ่ายครบแล้ว (รวมถึงเที่ยวที่ไม่มีค่าใช้จ่าย)\n            <\u002Flabel>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:9px;justify-content:flex-end;\">\n            <button onclick=\"{{ onSettleClose }}\" style=\"padding:10px 20px;background:#fff;color:#475467;border:1px solid #d0d5dd;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;\">ยกเลิก<\u002Fbutton>\n            <button onclick=\"{{ onSettleSave }}\" style=\"padding:10px 24px;background:#2f6fb0;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;\">บันทึก<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== ATTACHMENT LIGHTBOX ===== -->\n    <sc-if value=\"{{ lightboxOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ onCloseLightbox }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;\">\n        <sc-if value=\"{{ lightboxIsImage }}\" hint-placeholder-val=\"{{ false }}\">\n          {{ lightboxImgNode }}\n        <\u002Fsc-if>\n        <sc-if value=\"{{ lightboxNotImage }}\" hint-placeholder-val=\"{{ false }}\">\n          <div onclick=\"{{ stopProp }}\" style=\"background:#fff;border-radius:14px;padding:32px;text-align:center;max-width:380px;\">\n            <div style=\"font-size:46px;margin-bottom:10px;\">📄<\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;color:#16263a;margin-bottom:4px;word-break:break-all;\">{{ lightboxName }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#98a2b3;margin-bottom:18px;\">ไฟล์ชนิดนี้แสดงตัวอย่างไม่ได้<\u002Fdiv>\n            <a href=\"{{ lightboxUrl }}\" target=\"_blank\" download=\"{{ lightboxName }}\" style=\"display:inline-block;padding:10px 24px;background:#2f6fb0;color:#fff;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;\">เปิด / ดาวน์โหลด<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ onCloseLightbox }}\" style=\"padding:9px 22px;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;font-size:14px;font-weig
